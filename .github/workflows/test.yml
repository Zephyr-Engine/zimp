name: Zig

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container: jackpar/zig:0.16.0

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build project for release
        run: zig build -Doptimize=ReleaseFast

  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container: jackpar/zig:0.16.0-dev.2694

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Test project
        run: zig build test --summary all

  perf:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    container: jackpar/zig:0.16.0-dev.2694

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Ensure Python is available in container
        run: |
          if command -v python3 >/dev/null 2>&1; then
            echo "PYTHON_BIN=python3" >> "$GITHUB_ENV"
            python3 --version
            exit 0
          fi

          if command -v python >/dev/null 2>&1; then
            echo "PYTHON_BIN=python" >> "$GITHUB_ENV"
            python --version
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y python3
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache python3
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y python3
          elif command -v yum >/dev/null 2>&1; then
            yum install -y python3
          else
            echo "Could not find a supported package manager to install python3" >&2
            exit 1
          fi

          echo "PYTHON_BIN=python3" >> "$GITHUB_ENV"
          python3 --version

      - name: Run cook benchmark with CI metrics
        run: |
          mkdir -p .ci/perf-output
          zig build run -Doptimize=ReleaseFast -- cook --source examples/assets --output .ci/perf-output --force --metrics-json 2>&1 | tee .ci/cook.log

      - name: Extract metrics JSON
        run: |
          "$PYTHON_BIN" scripts/ci/extract_ci_metrics.py \
            --log-file .ci/cook.log \
            --output-file .ci/cook-metrics.json

      - name: Check performance regressions (pull requests)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERF_ACCEPT_BASELINE: ${{ contains(github.event.pull_request.labels.*.name, 'perf-baseline-accept') && '1' || '0' }}
        run: |
          EXTRA_FLAGS=""
          if [ "$PERF_ACCEPT_BASELINE" = "1" ]; then
            echo "PR has perf-baseline-accept label; regression check is non-blocking for this run."
            EXTRA_FLAGS="--no-fail-on-regression"
          fi

          "$PYTHON_BIN" scripts/ci/check_perf_regression.py \
            --metrics-file .ci/cook-metrics.json \
            --repo "${{ github.repository }}" \
            --workflow test.yml \
            --branch main \
            --window 10 \
            --min-samples 5 \
            --artifact-name cook-metrics-json \
            --artifact-file cook-metrics.json \
            --token "$GITHUB_TOKEN" \
            --current-run-id "${{ github.run_id }}" \
            --output-report .ci/perf-regression-report.json \
            $EXTRA_FLAGS

      - name: Check performance regressions (main push, non-blocking)
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          "$PYTHON_BIN" scripts/ci/check_perf_regression.py \
            --metrics-file .ci/cook-metrics.json \
            --repo "${{ github.repository }}" \
            --workflow test.yml \
            --branch main \
            --window 10 \
            --min-samples 5 \
            --artifact-name cook-metrics-json \
            --artifact-file cook-metrics.json \
            --token "$GITHUB_TOKEN" \
            --current-run-id "${{ github.run_id }}" \
            --output-report .ci/perf-regression-report.json \
            --no-fail-on-regression

      - name: Upload performance metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cook-metrics-json
          retention-days: 30
          path: |
            .ci/cook-metrics.json
            .ci/perf-regression-report.json
